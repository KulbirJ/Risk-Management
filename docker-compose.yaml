services:
  postgres:
    image: postgres:15-alpine
    container_name: compliance-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: multitenantpostgresdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d multitenantpostgresdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - compliance-network

  redis:
    image: redis:7-alpine
    container_name: compliance-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - compliance-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: compliance-backend
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/multitenantpostgresdb
      AWS_REGION: ca-west-1
      DEBUG: "True"
      LOG_LEVEL: INFO
      USE_LOCALSTACK: "False"
      USE_SECRETS_MANAGER: "False"
      JWT_SECRET_KEY: dev-secret-key-phase-0-only
      ALLOWED_ORIGINS: "http://localhost:3000,http://frontend:3000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - compliance-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_AWS_REGION: ca-west-1
        NEXT_PUBLIC_USE_MOCK_AUTH: "true"
        NEXT_PUBLIC_MOCK_TENANT_ID: "67636bd3-9846-4bde-806f-aea369fc9457"
        NEXT_PUBLIC_MOCK_USER_ID: "0bc9d6a9-f342-452e-9297-ee33f44d4f84"
    container_name: compliance-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_AWS_REGION: ca-west-1
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      NEXT_PUBLIC_MOCK_TENANT_ID: "67636bd3-9846-4bde-806f-aea369fc9457"
      NEXT_PUBLIC_MOCK_USER_ID: "0bc9d6a9-f342-452e-9297-ee33f44d4f84"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - compliance-network

volumes:
  postgres_data:
  redis_data:

networks:
  compliance-network:
    driver: bridge
