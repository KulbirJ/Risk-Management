name: Deploy to AWS Lambda & Amplify

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  AWS_REGION: ca-west-1
  LAMBDA_FUNCTION_NAME: compliance-platform-api
  PYTHON_VERSION: '3.11'

jobs:
  deploy-lambda:
    name: Deploy Backend to Lambda
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install all dependencies for Linux x86_64 (Lambda runtime)
          pip install --platform manylinux2014_x86_64 --only-binary=:all: --target ./lambda-package . || pip install --target ./lambda-package .
          cp -r backend/app ./lambda-package/
      
      - name: Create deployment package
        run: |
          cd lambda-package
          # Remove unnecessary files to reduce package size
          find . -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name 'tests' -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name 'test' -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name '*.pyc' -delete 2>/dev/null || true
          find . -type f -name '*.pyo' -delete 2>/dev/null || true
          find . -type d -name '*.dist-info' -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name '*.egg-info' -exec rm -rf {} + 2>/dev/null || true
          # Lambda runtime already includes boto3/botocore - remove to save ~60MB
          rm -rf boto3 botocore s3transfer 2>/dev/null || true
          # Remove other packages not needed in Lambda
          rm -rf uvicorn 2>/dev/null || true
          rm -rf docutils 2>/dev/null || true
          rm -rf setuptools pip _distutils_hack pkg_resources 2>/dev/null || true
          rm -rf jmespath/compat.py 2>/dev/null || true
          zip -r ../lambda-deployment.zip . -x '*.pyc' -x '__pycache__/*'
          echo "Package size: $(du -sh ../lambda-deployment.zip | cut -f1)"
      
      - name: Deploy to Lambda via S3
        run: |
          S3_BUCKET="compliance-platform-evidence-dev"
          S3_KEY="lambda-deployments/lambda-deployment-${{ github.sha }}.zip"
          
          echo "Uploading deployment package to s3://${S3_BUCKET}/${S3_KEY}..."
          aws s3 cp lambda-deployment.zip "s3://${S3_BUCKET}/${S3_KEY}" --region ${{ env.AWS_REGION }}
          
          echo "Deploying Lambda from S3..."
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket "${S3_BUCKET}" \
            --s3-key "${S3_KEY}" \
            --region ${{ env.AWS_REGION }}
          
          echo "Cleaning up old deployments (keep last 3)..."
          aws s3 ls "s3://${S3_BUCKET}/lambda-deployments/" --region ${{ env.AWS_REGION }} | \
            sort -r | tail -n +4 | awk '{print $4}' | \
            xargs -I {} aws s3 rm "s3://${S3_BUCKET}/lambda-deployments/{}" --region ${{ env.AWS_REGION }} 2>/dev/null || true
      
      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}
      
      - name: Update Lambda handler configuration
        run: |
          echo "Setting Lambda handler to app.main.lambda_handler and runtime to python3.11..."
          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --handler app.main.lambda_handler \
            --runtime python3.11 \
            --region ${{ env.AWS_REGION }}
          
          echo "Waiting for configuration update..."
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}
      
      - name: Run database migrations via Lambda
        run: |
          echo "Running database migrations via Lambda..."
          echo '{"action": "run_migrations"}' > payload.json
          aws lambda invoke \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --cli-binary-format raw-in-base64-out \
            --payload file://payload.json \
            --region ${{ env.AWS_REGION }} \
            migration-response.json
          
          echo "Migration response:"
          cat migration-response.json
          echo ""
          echo "Migrations completed"
      
      - name: Create deployment artifact
        run: |
          mkdir -p deployment
          cat > deployment/lambda-deployment-info.json <<EOF
          {
            "functionName": "${{ env.LAMBDA_FUNCTION_NAME }}",
            "version": "${{ github.sha }}",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment-info
          path: deployment/lambda-deployment-info.json
      
      - name: Deployment Summary
        run: |
          echo "✅ Lambda deployment completed successfully!"
          echo "Function: ${{ env.LAMBDA_FUNCTION_NAME }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Commit: ${{ github.sha }}"
          echo "Deployed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
