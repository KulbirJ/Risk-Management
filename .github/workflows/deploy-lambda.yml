name: Deploy to AWS Lambda & Amplify

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  AWS_REGION: ca-west-1
  LAMBDA_FUNCTION_NAME: compliance-platform-api
  PYTHON_VERSION: '3.11'

jobs:
  deploy-lambda:
    name: Deploy Backend to Lambda
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install all dependencies for Linux x86_64 (Lambda runtime)
          pip install --platform manylinux2014_x86_64 --only-binary=:all: --target ./lambda-package . || pip install --target ./lambda-package .
          cp -r backend/app ./lambda-package/
      
      - name: Create deployment package
        run: |
          cd lambda-package
          # Remove unnecessary files to reduce package size
          find . -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name 'tests' -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name 'test' -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name '*.pyc' -delete 2>/dev/null || true
          find . -type f -name '*.pyo' -delete 2>/dev/null || true
          find . -type d -name '*.dist-info' -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name '*.egg-info' -exec rm -rf {} + 2>/dev/null || true
          # Remove packages not needed in Lambda runtime
          rm -rf uvicorn 2>/dev/null || true
          rm -rf setuptools pip _distutils_hack pkg_resources docutils 2>/dev/null || true
          # Strip debug symbols from .so files to reduce size
          find . -name '*.so' -exec strip --strip-unneeded {} + 2>/dev/null || true
          zip -r ../lambda-deployment.zip . -x '*.pyc' -x '__pycache__/*'
          echo "Package size: $(du -sh ../lambda-deployment.zip | cut -f1)"
      
      - name: Deploy to Lambda via S3
        run: |
          S3_BUCKET="compliance-platform-evidence-dev"
          S3_KEY="lambda-deployments/lambda-deployment-${{ github.sha }}.zip"
          
          echo "Uploading deployment package to s3://${S3_BUCKET}/${S3_KEY}..."
          aws s3 cp lambda-deployment.zip "s3://${S3_BUCKET}/${S3_KEY}" --region ${{ env.AWS_REGION }}
          
          echo "Deploying Lambda from S3..."
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket "${S3_BUCKET}" \
            --s3-key "${S3_KEY}" \
            --region ${{ env.AWS_REGION }}
          
          echo "Cleaning up old deployments (keep last 3)..."
          aws s3 ls "s3://${S3_BUCKET}/lambda-deployments/" --region ${{ env.AWS_REGION }} | \
            sort -r | tail -n +4 | awk '{print $4}' | \
            xargs -I {} aws s3 rm "s3://${S3_BUCKET}/lambda-deployments/{}" --region ${{ env.AWS_REGION }} 2>/dev/null || true
      
      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Build and publish ML Lambda Layer
        run: |
          echo "Building ML Lambda Layer (numpy, scikit-learn, networkx)..."
          mkdir -p ml-layer/python

          # Install ML packages compiled for Lambda's manylinux2014_x86_64 runtime
          pip install \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --target ./ml-layer/python \
            "numpy>=1.26.0,<2.0" \
            "scikit-learn>=1.4.0" \
            "networkx>=3.2.0"

          # Slim the layer: remove tests, docs, pyc files, strip .so symbols
          find ./ml-layer/python -type d -name 'tests'       -exec rm -rf {} + 2>/dev/null || true
          find ./ml-layer/python -type d -name 'test'        -exec rm -rf {} + 2>/dev/null || true
          find ./ml-layer/python -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find ./ml-layer/python -name '*.pyc'  -delete
          find ./ml-layer/python -name '*.pyo'  -delete
          find ./ml-layer/python -name '*.dist-info' -type d -exec rm -rf {} + 2>/dev/null || true
          find ./ml-layer/python -name '*.so' -exec strip --strip-unneeded {} + 2>/dev/null || true
          # Remove large extras we don't need
          rm -rf ./ml-layer/python/numpy/core/tests 2>/dev/null || true
          rm -rf ./ml-layer/python/sklearn/datasets  2>/dev/null || true

          echo "Layer size before zip: $(du -sh ml-layer/python | cut -f1)"
          cd ml-layer && zip -r ../ml-layer.zip python/ -x '*.pyc' -x '__pycache__/*'
          echo "Layer zip size: $(du -sh ../ml-layer.zip | cut -f1)"

          # Upload layer zip to S3
          S3_BUCKET="compliance-platform-evidence-dev"
          S3_KEY="lambda-layers/ml-layer-${{ github.sha }}.zip"
          aws s3 cp ../ml-layer.zip "s3://${S3_BUCKET}/${S3_KEY}" --region ${{ env.AWS_REGION }}

          # Publish new layer version
          ML_LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "compliance-platform-ml-deps" \
            --description "numpy + scikit-learn + networkx (commit ${{ github.sha }})" \
            --content S3Bucket="${S3_BUCKET}",S3Key="${S3_KEY}" \
            --compatible-runtimes python3.11 \
            --region ${{ env.AWS_REGION }} \
            --query "LayerVersionArn" \
            --output text)

          echo "Published ML Layer ARN: ${ML_LAYER_ARN}"
          echo "ML_LAYER_ARN=${ML_LAYER_ARN}" >> $GITHUB_ENV

      - name: Update Lambda handler configuration
        run: |
          echo "Setting Lambda handler, runtime, and attaching ML layer..."
          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --handler app.main.lambda_handler \
            --runtime python3.11 \
            --layers "${{ env.ML_LAYER_ARN }}" \
            --region ${{ env.AWS_REGION }}
          
          echo "Waiting for configuration update..."
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}
      
      - name: Run database migrations via Lambda
        run: |
          echo "Running database migrations via Lambda..."
          echo '{"action": "run_migrations"}' > payload.json
          aws lambda invoke \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --cli-binary-format raw-in-base64-out \
            --payload file://payload.json \
            --region ${{ env.AWS_REGION }} \
            migration-response.json
          
          echo "Migration response:"
          cat migration-response.json
          echo ""
          echo "Migrations completed"

      - name: Create ML retraining CloudWatch schedule (Stage 4)
        run: |
          echo "Setting up weekly ML retraining EventBridge rule..."
          LAMBDA_ARN=$(aws lambda get-function \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Configuration.FunctionArn' \
            --output text)

          # Create or update the schedule rule (idempotent)
          aws events put-rule \
            --name "compliance-platform-ml-weekly-retrain" \
            --schedule-expression "cron(0 3 ? * SUN *)" \
            --description "Weekly ML model retraining - Sunday 3AM UTC" \
            --state ENABLED \
            --region ${{ env.AWS_REGION }}

          RULE_ARN=$(aws events describe-rule \
            --name "compliance-platform-ml-weekly-retrain" \
            --region ${{ env.AWS_REGION }} \
            --query 'Arn' \
            --output text)

          # Write targets JSON to file (avoids shell quoting issues)
          cat > /tmp/ml-retrain-target.json << 'TARGETS_EOF'
          [
            {
              "Id": "ml-retrain-target",
              "Arn": "LAMBDA_ARN_PLACEHOLDER",
              "Input": "{\"action\":\"retrain_ml_model\",\"algorithm\":\"random_forest\",\"auto_promote\":false}"
            }
          ]
          TARGETS_EOF

          # Replace the placeholder with the real ARN
          sed -i "s|LAMBDA_ARN_PLACEHOLDER|${LAMBDA_ARN}|" /tmp/ml-retrain-target.json

          aws events put-targets \
            --rule "compliance-platform-ml-weekly-retrain" \
            --region ${{ env.AWS_REGION }} \
            --targets file:///tmp/ml-retrain-target.json

          # Grant EventBridge permission to invoke Lambda (idempotent)
          aws lambda add-permission \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --statement-id "AllowEventBridgeMLRetrain" \
            --action "lambda:InvokeFunction" \
            --principal "events.amazonaws.com" \
            --source-arn "${RULE_ARN}" \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          echo "Permission already exists (idempotent)"

          echo "✅ ML retraining schedule configured: every Sunday 3AM UTC"
      
      - name: Create deployment artifact
        run: |
          mkdir -p deployment
          cat > deployment/lambda-deployment-info.json <<EOF
          {
            "functionName": "${{ env.LAMBDA_FUNCTION_NAME }}",
            "version": "${{ github.sha }}",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment-info
          path: deployment/lambda-deployment-info.json
      
      - name: Deployment Summary
        run: |
          echo "✅ Lambda deployment completed successfully!"
          echo "Function:  ${{ env.LAMBDA_FUNCTION_NAME }}"
          echo "Region:    ${{ env.AWS_REGION }}"
          echo "Commit:    ${{ github.sha }}"
          echo "ML Layer:  ${{ env.ML_LAYER_ARN }}"
          echo "Deployed:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
