name: Deploy to AWS Lambda & Amplify

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  AWS_REGION: ca-west-1
  LAMBDA_FUNCTION_NAME: compliance-platform-api
  PYTHON_VERSION: '3.11'

jobs:
  deploy-lambda:
    name: Deploy Backend to Lambda
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --target ./lambda-package
          cp -r backend/app ./lambda-package/
      
      - name: Create deployment package
        run: |
          cd lambda-package
          zip -r ../lambda-deployment.zip . -x '*.pyc' -x '__pycache__/*'
      
      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda-deployment.zip \
            --region ${{ env.AWS_REGION }}
      
      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}
      
      - name: Run database migrations via Lambda
        run: |
          echo "Running database migrations via Lambda..."
          echo '{"action": "run_migrations"}' > payload.json
          aws lambda invoke \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --cli-binary-format raw-in-base64-out \
            --payload file://payload.json \
            --region ${{ env.AWS_REGION }} \
            migration-response.json
          
          echo "Migration response:"
          cat migration-response.json
          echo ""
          echo "Migrations completed"
      
      - name: Create deployment artifact
        run: |
          mkdir -p deployment
          cat > deployment/lambda-deployment-info.json <<EOF
          {
            "functionName": "${{ env.LAMBDA_FUNCTION_NAME }}",
            "version": "${{ github.sha }}",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment-info
          path: deployment/lambda-deployment-info.json
      
      - name: Deployment Summary
        run: |
          echo "✅ Lambda deployment completed successfully!"
          echo "Function: ${{ env.LAMBDA_FUNCTION_NAME }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Commit: ${{ github.sha }}"
          echo "Deployed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
