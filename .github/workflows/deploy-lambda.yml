name: Deploy to AWS Lambda & Amplify

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  AWS_REGION: ca-west-1
  LAMBDA_FUNCTION_NAME: compliance-platform-api
  PYTHON_VERSION: '3.11'

jobs:
  deploy-lambda:
    name: Deploy Backend to Lambda
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --target ./lambda-package
          cp -r backend/app ./lambda-package/
      
      - name: Create deployment package
        run: |
          cd lambda-package
          zip -r ../lambda-deployment.zip . -x '*.pyc' -x '__pycache__/*'
      
      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda-deployment.zip \
            --region ${{ env.AWS_REGION }}
      
      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}
      
      - name: Run database migrations via Lambda
        run: |
          echo "Running database migrations via Lambda..."
          aws lambda invoke \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --payload '{"action": "run_migrations"}' \
            --region ${{ env.AWS_REGION }} \
            migration-response.json
          
          cat migration-response.json
          echo "Migrations completed"
      
      - name: Create deployment artifact
        run: |
          mkdir -p deployment
          cat > deployment/lambda-deployment-info.json <<EOF
          {
            "functionName": "${{ env.LAMBDA_FUNCTION_NAME }}",
            "version": "${{ github.sha }}",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment-info
          path: deployment/lambda-deployment-info.json
      
      - name: Create GitHub Deployment
        uses: actions/github-script@v6
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              production_environment: true,
              description: 'Deployed to AWS Lambda'
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: 'Deployment to Lambda succeeded'
            });
