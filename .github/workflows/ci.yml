name: CI - Lint, Test, Build

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff black mypy
      
      - name: Run Ruff linter
        run: ruff check backend/app --exit-zero
      
      - name: Check code formatting with Black
        run: black --check backend/app --line-length 100 || true
      
      - name: Type check with mypy
        run: mypy backend/app --ignore-missing-imports || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: multitenantpostgresdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio moto[ec2,s3,secretsmanager]
      
      - name: Create test .env file
        run: |
          cat > backend/.env.test <<EOF
          DEBUG=False
          LOG_LEVEL=INFO
          DATABASE_URL=postgresql://admin:admin_password@localhost:5432/multitenantpostgresdb
          USE_SECRETS_MANAGER=False
          AWS_REGION=ca-west-1
          REDIS_URL=redis://localhost:6379/0
          JWT_SECRET_KEY=test-secret-key-for-testing-only
          ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000
          EOF
      
      - name: Wait for PostgreSQL
        run: |
          apt-get update && apt-get install -y postgresql-client
          psql -h localhost -U admin -d multitenantpostgresdb -c "SELECT 1" || sleep 5
        env:
          PGPASSWORD: admin_password
      
      - name: Run Alembic migrations
        run: |
          cd backend
          alembic -c app/db/alembic/alembic.ini upgrade head
        env:
          DATABASE_URL: postgresql://admin:admin_password@localhost:5432/multitenantpostgresdb
      
      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: postgresql://admin:admin_password@localhost:5432/multitenantpostgresdb
          USE_SECRETS_MANAGER: 'False'
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install bandit
        run: pip install bandit
      
      - name: Run Bandit security scan
        run: bandit -r backend/app -f json -o bandit-report.json || true
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: compliance-platform-mvp:${{ github.sha }}
          cache-from: type=registry,ref=compliance-platform-mvp:buildcache
          cache-to: type=registry,ref=compliance-platform-mvp:buildcache,mode=max
