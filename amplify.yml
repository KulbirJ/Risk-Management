version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20
            - nvm use 20
            - npm ci
        build:
          commands:
            - "export NEXT_PUBLIC_API_URL=https://oyxvwg62f7.execute-api.ca-west-1.amazonaws.com"
            - "export NEXT_PUBLIC_AWS_REGION=ca-west-1"
            - "export NEXT_PUBLIC_USE_MOCK_AUTH=true"
            - "echo Building with API URL: $NEXT_PUBLIC_API_URL"
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
      buildSettings:
        framework: nextjs
