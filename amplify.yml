version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm ci
    build:
      commands:
        - env | grep -i NEXT || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
environment:
  variables:
    NEXT_PUBLIC_API_URL: https://oyxvwg62f7.execute-api.ca-west-1.amazonaws.com
    NEXT_PUBLIC_AWS_REGION: ca-west-1
    NEXT_PUBLIC_USE_MOCK_AUTH: "false"
