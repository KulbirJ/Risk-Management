# pytest configuration for the compliance platform

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=app
    --cov-report=term-missing
    --cov-report=xml
    --cov-report=html
    -p no:warnings

markers =
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests
    slow: slow tests
    requires_aws: tests that require AWS credentials
    requires_db: tests that require database

asyncio_mode = auto
